<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>東海道五十三次クイズ</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#b63e46">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app-container">
    
    <!-- クイズ画面 -->
    <div id="quiz-screen" class="screen active">
      <header>
        <div class="progress-bar">
          <div id="progress-fill"></div>
        </div>
        <div id="progress-text">1 / 54</div>
      </header>

      <!-- 新設：CSSで描くルート線と現在地ピンの表示エリア -->
      <div id="route-map-container">
        <div class="route-line"></div>
        <!-- 主要なランドマーク（目安） -->
        <span class="landmark landmark-edo">江戸</span>
        <span class="landmark landmark-fuji">富士山</span>
        <span class="landmark landmark-nagoya">名古屋</span>
        <span class="landmark landmark-kyoto">京都</span>
        <!-- 動く現在地ピン -->
        <div id="map-pin">
          <span class="pin-icon">📍</span>
          <span id="pin-label">日本橋</span>
        </div>
      </div>

      <main>
        <div class="current-station">
          <span class="label">現在の宿場</span>
          <h1 id="current-name">日本橋</h1>
          <!-- 名物テキストのみ表示 -->
          <p id="current-meibutsu" class="station-meibutsu"></p>
        </div>
        
        <div class="question-area">
          <p class="question-text">次の宿場はどこ？</p>
          <div id="choices-container">
            <!-- 選択肢がJavaScriptで挿入されます -->
          </div>
        </div>
        
        <!-- ご当地の面白ヒント表示エリア -->
        <div id="hint-area" class="hint-card">
          <h3>💡 ご当地ヒント</h3>
          <p id="current-hint-text">ヒントのテキストがここに入ります</p>
        </div>
      </main>

      <!-- 正誤フィードバックオーバレイ -->
      <div id="feedback-overlay" class="hidden">
        <div id="feedback-icon"></div>
        <p id="feedback-message"></p>
      </div>
    </div>

    <!-- クリア画面 -->
    <div id="clear-screen" class="screen hidden">
      <div class="clear-content">
        <h1>踏破達成！</h1>
        <p>東海道五十三次（日本橋から三条大橋まで）を完全制覇しました。</p>
        <div class="clear-stamp">GOAL</div>
        <button id="restart-btn" class="btn primary">もう一度出発する</button>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => console.log('ServiceWorker registered'))
          .catch(error => console.log('ServiceWorker error:', error));
      });
    }
  </script>
</body>
</html>
